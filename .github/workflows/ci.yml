name: ci
on:
  pull_request_target:
    branches: [ main, feature/*, hotfix/* ]
  push:
    branches: [ main, feature/*, hotfix/* ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    environment: ci
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{github.event.pull_request.head.ref}}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        lfs: true

    - uses: ./.github/actions/build

    - run: npm run lint
      shell: bash
      working-directory: templates

    - run: npm test
      shell: bash
      working-directory: templates

    - run: dotnet test -c Release -f net8.0 --no-build --collect:"XPlat Code Coverage" --consoleLoggerParameters:"Summary;Verbosity=Minimal"
      id: test-net80

    - run: dotnet test -c Release -f net6.0 --no-build --collect:"XPlat Code Coverage" --consoleLoggerParameters:"Summary;Verbosity=Minimal"
      if: matrix.os == 'ubuntu-latest'
      id: test-net60

    - run: npm i -g @percy/cli
      if: matrix.os == 'ubuntu-latest'

    - run: percy exec -- dotnet test -c Release -f net8.0 --filter Stage=Percy --no-build --collect:"XPlat Code Coverage"
      if: matrix.os == 'ubuntu-latest'
      env:
        PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

    - run: echo "DOTNET_DbgEnableMiniDump=1" >> $GITHUB_ENV
      if: matrix.os == 'ubuntu-latest'

    - run: dotnet run -c Release --no-build -f net8.0 --project src/docfx -- docs/docfx.json
    - run: dotnet run -c Release --no-build -f net8.0 --project src/docfx -- samples/seed/docfx.json --output docs/_site/seed

    - uses: actions/upload-pages-artifact@v3
      if: matrix.os == 'ubuntu-latest'
      with:
        path: docs/_site

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: logs-${{ matrix.os }}
        path: |
          msbuild.binlog
          test/**/TestResults/*.trx
          test/**/TestResults/*.html

    - uses: actions/upload-artifact@v4
      if: ${{ failure() && matrix.os == 'ubuntu-latest' }}
      with:
        name: dump
        path: /tmp/coredump*

    - name: Report failed test names
      if: ${{ failure() && (steps.test-net80.outcome == 'failure' || steps.test-net60.outcome == 'failure') }}
      shell: pwsh
      run: |
        $trxFiles = Get-ChildItem test -Filter *.trx -Recurse
        $failedTests = @()

        foreach($trxFile in $trxFiles)
        {
          [xml]$trx = Get-Content $trxFile -Raw
          if($trx.TestRun.ResultSummary.outcome -eq 'Failed')
          {
            $failedTests += $trx.TestRun.Results.UnitTestResult | where { $_.outcome -eq 'Failed' }
          }
        }

        if($failedTests.Length -gt 0)
        {
          Write-Output "## Failed Tests" >> $env:GITHUB_STEP_SUMMARY
          foreach($failedTest in $failedTests)
          {
            Write-Output ""                                        >> $env:GITHUB_STEP_SUMMARY
            Write-Output "### :x: $($failedTest.testName)"         >> $env:GITHUB_STEP_SUMMARY
            Write-Output "$($failedTest.Output.ErrorInfo.Message)" >> $env:GITHUB_STEP_SUMMARY
            Write-Output "<details><summary>StackTrace</summary><pre>$($failedTest.Output.ErrorInfo.StackTrace)</pre></details>" >> $env:GITHUB_STEP_SUMMARY
          }
        }

  publish-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pages: write
      id-token: write
    steps:
    - id: deployment
      uses: actions/deploy-pages@v4
